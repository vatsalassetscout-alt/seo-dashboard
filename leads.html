<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Leads Dashboard - Zone Slider Filter</title>
    <style>
        [data-theme="dark"] {
            --bg: #060a12;
            --s1: #0d1420;
            --s2: #111c2e;
            --s3: #172035;
            --border: #1e2d45;
            --border2: #243553;
            --text: #e2e8f0;
            --text2: #94a3b8;
            --text3: #4a5f7a;
            --shadow: rgba(0,0,0,.4);
            --blue: #3b82f6;
            --blue2: #60a5fa;
            --green: #10b981;
            --amber: #f59e0b;
            --red: #ef4444;
            --purple: #8b5cf6;
            --mono: 'JetBrains Mono', 'SF Mono', monospace;
            --logo-filter: brightness(0) invert(1);
        }
        [data-theme="light"] {
            --bg: #f0f4fa;
            --s1: #ffffff;
            --s2: #f5f8ff;
            --s3: #eaf0fb;
            --border: #d1ddf0;
            --border2: #b8cce4;
            --text: #0f172a;
            --text2: #475569;
            --text3: #94a3b8;
            --shadow: rgba(0,0,0,.08);
            --blue: #3b82f6;
            --blue2: #2563eb;
            --green: #10b981;
            --amber: #f59e0b;
            --red: #ef4444;
            --purple: #8b5cf6;
            --mono: 'JetBrains Mono', 'SF Mono', monospace;
            --logo-filter: none;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; transition: background-color 0.2s, color 0.2s, border-color 0.2s; }
        body { background: var(--bg); color: var(--text); padding: 20px; min-height: 100vh; font-family: system-ui, -apple-system, 'Segoe UI', Roboto; }
        .container { max-width: 1400px; margin: 0 auto; }

        .header { background: var(--s1); border: 1px solid var(--border); border-radius: 12px; padding: 20px 25px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; box-shadow: 0 1px 4px var(--shadow); position: relative; }
        h1 { font-size: 24px; font-weight: 700; background: linear-gradient(135deg, var(--blue), var(--purple)); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .logo-img { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); height: 40px; filter: var(--logo-filter); object-fit: contain; }
        .header-right { display: flex; align-items: center; gap: 12px; flex: 1; justify-content: flex-end; position: relative; z-index: 1; }
        .web-btn { background: linear-gradient(135deg, var(--purple), var(--blue)); color: white; border: none; padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; font-family: inherit; }
        .web-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(139,92,246,0.3); }
        .theme-toggle { display: flex; gap: 8px; background: var(--s2); padding: 4px; border-radius: 10px; border: 1px solid var(--border); }
        .theme-btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; background: transparent; color: var(--text2); font-family: inherit; }
        .theme-btn.active { background: var(--blue); color: white; }
        .theme-btn:hover:not(.active) { background: var(--s3); color: var(--text); }

        .filter-bar { background: var(--s1); border: 1px solid var(--border); border-radius: 12px; padding: 20px 25px; margin-bottom: 20px; display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; box-shadow: 0 1px 4px var(--shadow); }
        .date-field { display: flex; flex-direction: column; gap: 6px; }
        .date-field label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.9px; color: var(--text3); }
        select, button, input[type="date"] { padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); cursor: pointer; font-size: 13px; background: var(--bg); color: var(--text); font-family: inherit; }
        select:focus, input[type="date"]:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 2px rgba(59,130,246,0.2); }
        button { background: var(--blue); color: white; border: none; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        button:hover { background: var(--blue2); transform: translateY(-1px); }
        button.clear-range { background: var(--text3); }
        button.clear-range:hover { background: var(--text2); }
        [data-theme="dark"] ::-webkit-calendar-picker-indicator { filter: invert(1); }

        .multi-select-wrapper, .source-filter-wrapper, .project-filter-wrapper { position: relative; display: inline-block; }
        .multi-select-btn, .source-filter-btn, .project-filter-btn { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 32px 8px 16px; font-size: 13px; color: var(--text); cursor: pointer; font-family: inherit; min-width: 150px; text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; position: relative; }
        .multi-select-btn::after, .source-filter-btn::after, .project-filter-btn::after { content: '▼'; position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--text2); }
        .multi-select-dropdown, .source-filter-dropdown, .project-filter-dropdown { position: absolute; top: 100%; left: 0; background: var(--s1); border: 1px solid var(--border); border-radius: 8px; margin-top: 4px; min-width: 220px; max-height: 280px; overflow-y: auto; z-index: 100; box-shadow: 0 4px 12px var(--shadow); display: none; }
        .multi-select-dropdown.show, .source-filter-dropdown.show, .project-filter-dropdown.show { display: block; }
        .dropdown-search { padding: 8px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--s1); }
        .dropdown-search input { width: 100%; padding: 6px 10px; font-size: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); }
        .dropdown-search input:focus { outline: none; border-color: var(--blue); }
        .dropdown-option { padding: 8px 12px; display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 13px; }
        .dropdown-option:hover { background: var(--s2); }
        .dropdown-option input[type="checkbox"] { width: 16px; height: 16px; margin: 0; cursor: pointer; accent-color: var(--blue); min-width: 16px; }
        .dropdown-option label { cursor: pointer; flex: 1; font-size: 13px; color: var(--text); }
        .dropdown-actions { padding: 8px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: space-between; position: sticky; bottom: 0; background: var(--s1); }
        .dropdown-actions button { padding: 4px 10px; font-size: 11px; background: var(--s2); color: var(--text2); border: 1px solid var(--border); transform: none; }
        .dropdown-actions button:hover { background: var(--blue); color: white; }

        .zone-slider-wrapper {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .zone-slider-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.9px;
            color: var(--text3);
        }
        .zone-slider-track {
            position: relative;
            display: flex;
            align-items: center;
            background: var(--s2);
            border: 1px solid var(--border);
            border-radius: 30px;
            width: 240px;
            height: 36px;
            padding: 3px;
            cursor: pointer;
            user-select: none;
        }
        .zone-slider-pill {
            position: absolute;
            width: 33.33%;
            height: calc(100% - 6px);
            background: var(--blue);
            border-radius: 24px;
            transition: left 0.25s cubic-bezier(.4,0,.2,1), background 0.25s;
            left: 3px;
            top: 3px;
            box-shadow: 0 2px 8px rgba(59,130,246,0.35);
        }
        .zone-slider-pill.zone-west { left: 3px; background: var(--purple); box-shadow: 0 2px 8px rgba(139,92,246,0.35); }
        .zone-slider-pill.zone-mid { left: calc(33.33% + 0px); background: var(--blue); box-shadow: 0 2px 8px rgba(59,130,246,0.35); }
        .zone-slider-pill.zone-north { left: calc(66.66% - 3px); background: var(--green); box-shadow: 0 2px 8px rgba(16,185,129,0.35); }
        .zone-labels {
            display: flex;
            width: 100%;
            position: relative;
            z-index: 1;
        }
        .zone-label {
            flex: 1;
            text-align: center;
            font-size: 11px;
            font-weight: 700;
            color: var(--text3);
            transition: color 0.2s;
            letter-spacing: 0.3px;
        }
        .zone-label.active { color: white; }
        .zone-active-text {
            font-size: 11px;
            color: var(--text3);
            font-weight: 500;
            text-align: center;
        }
        .zone-active-text span { color: var(--blue); font-weight: 700; }
        .zone-active-text.zone-west span { color: var(--purple); }
        .zone-active-text.zone-mid span { color: var(--blue); }
        .zone-active-text.zone-north span { color: var(--green); }

        .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--s1); border: 1px solid var(--border); border-radius: 12px; padding: 18px; text-align: center; box-shadow: 0 1px 4px var(--shadow); position: relative; overflow: hidden; transition: transform 0.2s, border-color 0.2s; }
        .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--accent-color, var(--blue)); opacity: 0.7; }
        .stat-card:hover { transform: translateY(-2px); border-color: var(--accent-color, var(--blue)); }
        .stat-card:nth-child(1) { --accent-color: var(--blue); }
        .stat-card:nth-child(2) { --accent-color: var(--purple); }
        .stat-card:nth-child(3) { --accent-color: var(--green); }
        .stat-card:nth-child(4) { --accent-color: var(--amber); }
        .stat-number { font-size: 32px; font-weight: 800; font-family: var(--mono); color: var(--accent-color, var(--blue)); line-height: 1.2; }
        .stat-label { font-size: 11px; margin-top: 6px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 500; }

        .projects-section { background: var(--s1); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px var(--shadow); }
        .section-title { padding: 15px 25px; font-weight: 600; font-size: 14px; border-bottom: 1px solid var(--border); text-align: center; background: var(--s2); color: var(--text2); }
        .table-header { display: flex; padding: 12px 25px; background: var(--blue); color: white; font-weight: 600; font-size: 12px; letter-spacing: 0.5px; text-transform: uppercase; }
        .header-project { width: 40%; text-align: left; padding-left: 4px; }
        .header-location { width: 35%; text-align: center; }
        .header-count { width: 25%; text-align: right; padding-right: 10px; }
        .project-item { display: flex; align-items: center; padding: 14px 25px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.2s; }
        .project-item:hover { background: var(--s2); }
        .project-info { width: 40%; text-align: left; padding-left: 4px; }
        .project-name { font-weight: 600; font-size: 15px; color: var(--text); }
        .project-location-center { width: 35%; text-align: center; font-weight: 500; font-size: 13px; color: var(--blue); }
        .project-count { width: 25%; text-align: right; font-weight: 700; font-size: 14px; font-family: var(--mono); padding-right: 10px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .modal-content { background: var(--s1); border: 1px solid var(--border); border-radius: 16px; width: 90%; max-width: 550px; max-height: 80vh; overflow: hidden; box-shadow: 0 8px 32px var(--shadow); animation: modalSlideIn 0.2s ease; }
        @keyframes modalSlideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-header { padding: 15px 20px; background: var(--blue); color: white; display: flex; justify-content: space-between; align-items: center; }
        .modal-header h3 { font-size: 16px; font-weight: 600; }
        .close-modal { background: none; border: none; color: white; font-size: 24px; cursor: pointer; opacity: 0.8; transition: opacity 0.2s; transform: none; }
        .close-modal:hover { opacity: 1; transform: none; background: none; }
        .timestamps-list { padding: 10px 0; max-height: 65vh; overflow-y: auto; }
        .source-group { margin: 8px 0; border-bottom: 1px solid var(--border); }
        .source-title { padding: 12px 20px; font-weight: 600; font-size: 13px; border-left: 3px solid var(--blue); background: var(--s2); color: var(--text); }
        .timestamp-item { padding: 8px 20px 8px 35px; font-family: var(--mono); font-size: 12px; border-bottom: 1px solid var(--border); color: var(--text2); }
        .loading, .no-data { text-align: center; padding: 50px; color: var(--text3); font-size: 14px; }
        .last-updated { text-align: center; font-size: 11px; color: var(--text3); margin-top: 15px; padding: 12px; font-family: var(--mono); }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--s2); border-radius: 3px; }
        ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--blue); }

        @media (max-width: 768px) {
            .stats { grid-template-columns: repeat(2,1fr); }
            .table-header { display: none; }
            .project-item { flex-direction: column; gap: 8px; text-align: center; }
            .project-info, .project-location-center, .project-count { width: 100%; text-align: center; padding: 0; }
            .filter-bar { flex-direction: column; align-items: stretch; }
            .header-right { width: 100%; justify-content: center; flex-wrap: wrap; }
            .zone-slider-track { width: 100%; }
        }
        @media (max-width: 480px) { .stats { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <div style="flex:1;">
            <h1>Leads Dashboard</h1>
        </div>
        <img class="logo-img" src="https://assetscout.in/assets/images/Assetscout%20Logo%20Black.webp" alt="Asset Scout" onerror="this.style.display='none'">
        <div class="header-right">
            <button class="web-btn" id="webDashboardBtn">Web</button>
            <div class="theme-toggle">
                <button class="theme-btn" onclick="setTheme('light')">☀️</button>
                <button class="theme-btn active" onclick="setTheme('dark')">🌙</button>
            </div>
        </div>
    </div>

    <div class="filter-bar">
        <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;">
            <div class="date-field">
                <label>START DATE</label>
                <input type="date" id="startDateFilter">
            </div>
            <div class="date-field">
                <label>END DATE</label>
                <input type="date" id="endDateFilter">
            </div>
            <button id="applyDateRangeBtn">Apply Range</button>
           
        </div>

        <div class="project-filter-wrapper">
            <div class="project-filter-btn" id="projectFilterBtn">All Projects</div>
            <div class="project-filter-dropdown" id="projectDropdown">
                <div class="dropdown-search"><input type="text" placeholder="Search project..." id="projectSearch"></div>
                <div id="projectOptions"></div>
                <div class="dropdown-actions">
                    <button id="selectAllProjects">Select All</button>
                    <button id="clearAllProjects">Clear All</button>
                </div>
            </div>
        </div>

        <div class="multi-select-wrapper">
            <div class="multi-select-btn" id="locationSelectBtn">All Locations</div>
            <div class="multi-select-dropdown" id="locationDropdown">
                <div class="dropdown-search"><input type="text" placeholder="Search location..." id="locationSearch"></div>
                <div id="locationOptions"></div>
                <div class="dropdown-actions">
                    <button id="selectAllLocations">Select All</button>
                    <button id="clearAllLocations">Clear All</button>
                </div>
            </div>
        </div>

        <div class="source-filter-wrapper">
            <div class="source-filter-btn" id="sourceFilterBtn">All Sources</div>
            <div class="source-filter-dropdown" id="sourceDropdown">
                <div class="dropdown-search"><input type="text" placeholder="Search source..." id="sourceSearch"></div>
                <div id="sourceOptions"></div>
                <div class="dropdown-actions">
                    <button id="selectAllSources">Select All</button>
                    <button id="clearAllSources">Clear All</button>
                </div>
            </div>
        </div>

        <div class="zone-slider-wrapper">
           
            <div class="zone-slider-track" id="zoneSliderTrack">
                <div class="zone-slider-pill zone-mid" id="zonePill"></div>
                <div class="zone-labels">
                    <div class="zone-label" id="zoneLabelWest">West</div>
                    <div class="zone-label active" id="zoneLabelMid">All</div>
                    <div class="zone-label" id="zoneLabelNorth">North</div>
                </div>
            </div>
            <div class="zone-active-text zone-mid" id="zoneActiveText"><span></span></div>
        </div>

        <button onclick="resetAllFilters()">Reset All</button>
    </div>

    <div class="stats">
        <div class="stat-card"><div class="stat-number" id="totalLeads">--</div><div class="stat-label">Total Leads</div></div>
        <div class="stat-card"><div class="stat-number" id="totalProjects">--</div><div class="stat-label">Projects</div></div>
        <div class="stat-card"><div class="stat-number" id="totalLocations">--</div><div class="stat-label">Locations</div></div>
        <div class="stat-card"><div class="stat-number" id="totalSources">--</div><div class="stat-label">Sources</div></div>
    </div>

    <div class="projects-section">
        <div class="section-title">Projects (Click any row to see leads grouped by source)</div>
        <div class="table-header">
            <div class="header-project">Project Name</div>
            <div class="header-location">Location</div>
            <div class="header-count">Lead Count</div>
        </div>
        <div id="projectList">
            <div class="loading">Loading data from Google Sheets...</div>
        </div>
    </div>
    <div class="last-updated" id="lastUpdated">--</div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">Lead Details by Source</h3>
            <button class="close-modal" onclick="closeModal()">✕</button>
        </div>
        <div id="timestampsList" class="timestamps-list"></div>
    </div>
</div>

<script>
    const SHEET_ID   = "14TBSWEZ4rlIkLECg2MrBCUYFwy8coCzISZUqJW_lCOc";
    const SHEET_NAME = "Sheet1";
    const API_KEY    = "AIzaSyBayWQDOC1xhIlrzyzG9pFNEaKKh8wjFhY";

    const ZONE_LOCATIONS = {
        west:  ["West Pune", "Wakad", "Hinjewadi", "Baner", "Aundh", "Pashan", "Balewadi"],
        north: ["North Pune", "Moshi", "Chakan", "Alandi", "Dehu Road", "Bhosari", "Dighi"]
    };

    let allData = [];
    let currentStartDate = null;
    let currentEndDate   = null;
    let isLoading        = false;
    let selectedLocations = new Set();
    let selectedSources   = new Set();
    let selectedProjects  = new Set();
    let currentZone = 'mid';

    function setTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        document.body.setAttribute('data-theme', theme);
        document.querySelectorAll('.theme-btn').forEach(btn => {
            btn.classList.toggle('active',
                (theme === 'light' && btn.textContent.includes('☀')) ||
                (theme === 'dark'  && btn.textContent.includes('🌙'))
            );
        });
        localStorage.setItem('leads_theme', theme);
    }

    function setZone(zone) {
        currentZone = zone;
        const pill = document.getElementById('zonePill');
        const text = document.getElementById('zoneActiveText');
        const lW = document.getElementById('zoneLabelWest');
        const lM = document.getElementById('zoneLabelMid');
        const lN = document.getElementById('zoneLabelNorth');
        [lW, lM, lN].forEach(l => l.classList.remove('active'));
        pill.className = 'zone-slider-pill';
        text.className = 'zone-active-text';
        if (zone === 'west') {
            pill.classList.add('zone-west');
            text.classList.add('zone-west');
            text.innerHTML = 'Showing: <span>West Pune</span>';
            lW.classList.add('active');
        } else if (zone === 'north') {
            pill.classList.add('zone-north');
            text.classList.add('zone-north');
            text.innerHTML = 'Showing: <span>North Pune</span>';
            lN.classList.add('active');
        } else {
            pill.classList.add('zone-mid');
            text.classList.add('zone-mid');
            text.innerHTML = 'Showing: <span>All Pune</span>';
            lM.classList.add('active');
        }
        renderDashboard();
    }

    function applyZoneFilter(dataArray) {
        if (currentZone === 'west') {
            return dataArray.filter(row => ZONE_LOCATIONS.west.some(zoneKey => 
                row[3] && row[3].toLowerCase().includes(zoneKey.toLowerCase())
            ));
        }
        if (currentZone === 'north') {
            return dataArray.filter(row => ZONE_LOCATIONS.north.some(zoneKey => 
                row[3] && row[3].toLowerCase().includes(zoneKey.toLowerCase())
            ));
        }
        return dataArray;
    }

    function setupZoneSlider() {
        const track = document.getElementById('zoneSliderTrack');
        if (!track) return;
        track.addEventListener('click', function(e) {
            const rect = track.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const third = rect.width / 3;
            if (x < third) setZone('west');
            else if (x < third * 2) setZone('mid');
            else setZone('north');
        });
        let dragStartX = null;
        track.addEventListener('touchstart', function(e) { 
            dragStartX = e.touches[0].clientX; 
        }, { passive: true });
        track.addEventListener('touchend', function(e) {
            if (dragStartX === null) return;
            const diff = e.changedTouches[0].clientX - dragStartX;
            if (Math.abs(diff) < 10) return;
            if (diff > 0) setZone(currentZone === 'west' ? 'mid' : 'north');
            else setZone(currentZone === 'north' ? 'mid' : 'west');
            dragStartX = null;
        }, { passive: true });
    }

    function parseFlexibleDate(v) {
        if (!v) return null;
        if (v instanceof Date && !isNaN(v)) return v;
        if (typeof v === 'string') {
            let d = new Date(v.trim());
            if (!isNaN(d)) return d;
            let m = v.trim().match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);
            if (m) {
                let dt = new Date(+m[3], +m[2]-1, +m[1]);
                let tm = v.match(/(\d{1,2}):(\d{2})(?::(\d{2}))?/);
                if (tm) dt.setHours(+tm[1], +tm[2], tm[3] ? +tm[3] : 0);
                if (!isNaN(dt)) return dt;
            }
        }
        if (typeof v === 'number') {
            let d = new Date((v - 25569) * 86400000);
            if (!isNaN(d)) return d;
        }
        return null;
    }

    function formatDisplayDate(v) {
        let d = parseFlexibleDate(v);
        if (!d) return String(v);
        let dd = String(d.getDate()).padStart(2,'0');
        let mm = String(d.getMonth()+1).padStart(2,'0');
        let hh = String(d.getHours()).padStart(2,'0');
        let mi = String(d.getMinutes()).padStart(2,'0');
        return `${dd}/${mm}/${d.getFullYear()} ${hh}:${mi}`;
    }

    function filterData() {
        if (!allData.length) return [];
        let out = [...allData];

        if (currentStartDate || currentEndDate) {
            out = out.filter(r => {
                let d = parseFlexibleDate(r[0]);
                if (!d) return false;
                let day = new Date(d.getFullYear(), d.getMonth(), d.getDate());
                if (currentStartDate) {
                    let s = new Date(currentStartDate.getFullYear(), currentStartDate.getMonth(), currentStartDate.getDate());
                    if (day < s) return false;
                }
                if (currentEndDate) {
                    let e = new Date(currentEndDate.getFullYear(), currentEndDate.getMonth(), currentEndDate.getDate());
                    if (day > e) return false;
                }
                return true;
            });
        }

        if (selectedLocations.size > 0) out = out.filter(r => selectedLocations.has(r[3]));
        if (selectedSources.size   > 0) out = out.filter(r => selectedSources.has(r[2]));
        if (selectedProjects.size  > 0) out = out.filter(r => selectedProjects.has(r[1]));
        
        out = applyZoneFilter(out);
        
        return out;
    }

    function renderDashboard() {
        if (!allData.length) {
            document.getElementById('projectList').innerHTML = '<div class="loading">No data loaded.</div>';
            ['totalLeads','totalProjects','totalLocations','totalSources'].forEach(id => document.getElementById(id).innerText = '0');
            return;
        }

        const leads = filterData();
        const projectMap = new Map();
        const uniqueLocs = new Set();
        const uniqueSrcs = new Set();

        leads.forEach(r => {
            if (!r[1]) return;
            if (!projectMap.has(r[1])) projectMap.set(r[1], { count: 0, location: r[3] || 'Unknown' });
            projectMap.get(r[1]).count++;
            if (r[3]) uniqueLocs.add(r[3]);
            if (r[2]) uniqueSrcs.add(r[2]);
        });

        document.getElementById('totalLeads').innerText     = leads.length.toLocaleString();
        document.getElementById('totalProjects').innerText  = projectMap.size.toLocaleString();
        document.getElementById('totalLocations').innerText = uniqueLocs.size.toLocaleString();
        document.getElementById('totalSources').innerText   = uniqueSrcs.size.toLocaleString();

        const sorted = Array.from(projectMap.entries()).sort((a,b) => b[1].count - a[1].count);
        const list = document.getElementById('projectList');

        if (!sorted.length) {
            list.innerHTML = '<div class="no-data">No leads match selected filters</div>';
        } else {
            list.innerHTML = sorted.map(([name, data]) => `
                <div class="project-item" onclick='showProjectDetails(${JSON.stringify(name)})'>
                    <div class="project-info"><span class="project-name">${escapeHtml(name)}</span></div>
                    <div class="project-location-center">${escapeHtml(data.location)}</div>
                    <div class="project-count">${data.count.toLocaleString()} leads</div>
                </div>
            `).join('');
        }

        let rangeText = '';
        if (currentStartDate || currentEndDate) {
            const s = currentStartDate ? currentStartDate.toLocaleDateString('en-GB') : 'any';
            const e = currentEndDate   ? currentEndDate.toLocaleDateString('en-GB')   : 'any';
            rangeText = ` | Date: ${s} -> ${e}`;
        }
        let filterText = '';
        if (selectedLocations.size) filterText += ` | Locs: ${selectedLocations.size}`;
        if (selectedSources.size)   filterText += ` | Srcs: ${selectedSources.size}`;
        if (selectedProjects.size)  filterText += ` | Projs: ${selectedProjects.size}`;
        let zoneText = currentZone !== 'mid' ? ` | Zone: ${currentZone.toUpperCase()}` : '';

        document.getElementById('lastUpdated').innerHTML =
            `${new Date().toLocaleTimeString()} | ${leads.length.toLocaleString()} leads${rangeText}${filterText}${zoneText}`;
    }

    async function fetchData() {
        if (isLoading) return;
        isLoading = true;
        document.getElementById('projectList').innerHTML = '<div class="loading">Loading data from Google Sheets...</div>';

        try {
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(SHEET_NAME)}!A:D?key=${API_KEY}`;
            const response = await fetch(url);

            if (response.status === 404) throw new Error('Sheet not found');
            if (response.status === 403) throw new Error('Access denied');
            if (!response.ok) throw new Error(`HTTP ${response.status}`);

            const data = await response.json();
            if (data.error) throw new Error(data.error.message);

            if (!data.values || data.values.length <= 1) {
                document.getElementById('projectList').innerHTML = '<div class="no-data">No data found in sheet</div>';
                isLoading = false;
                return;
            }

            allData = [];
            for (let i = 1; i < data.values.length; i++) {
                const r = data.values[i];
                if (r[0] && r[1]) {
                    allData.push([r[0]||'', r[1]||'', r[2]||'', r[3]||'']);
                }
            }

            if (!allData.length) {
                document.getElementById('projectList').innerHTML = '<div class="no-data">No valid rows found</div>';
                isLoading = false;
                return;
            }

            renderLocationOptions();
            renderSourceOptions();
            renderProjectOptions();
            renderDashboard();

        } catch (err) {
            document.getElementById('projectList').innerHTML = `
                <div class="no-data">
                    Failed to load data<br>
                    <small>${escapeHtml(err.message)}</small><br><br>
                    <button onclick="fetchData()" style="background:var(--blue);color:white;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;">
                        Retry
                    </button>
                </div>`;
        } finally {
            isLoading = false;
        }
    }

    function applyDateRange() {
        const s = document.getElementById('startDateFilter').value;
        const e = document.getElementById('endDateFilter').value;
        if (s) { let p = s.split('-'); currentStartDate = new Date(+p[0], +p[1]-1, +p[2]); currentStartDate.setHours(0,0,0,0); }
        else currentStartDate = null;
        if (e) { let p = e.split('-'); currentEndDate = new Date(+p[0], +p[1]-1, +p[2]); currentEndDate.setHours(23,59,59,999); }
        else currentEndDate = null;
        if (currentStartDate && currentEndDate && currentStartDate > currentEndDate) {
            alert('Start date cannot be after End date');
            [currentStartDate, currentEndDate] = [currentEndDate, currentStartDate];
            document.getElementById('startDateFilter').value = currentStartDate.toISOString().split('T')[0];
            document.getElementById('endDateFilter').value   = currentEndDate.toISOString().split('T')[0];
        }
        renderDashboard();
    }

   //      document.getElementById('startDateFilter').value = '';
   //      document.getElementById('endDateFilter').value   = '';
   //      currentStartDate = null;
   //      currentEndDate   = null;
   //      renderDashboard();
   //  }

    function resetAllFilters() {
        clearDateRange();
        selectedLocations.clear(); updateLocationButtonText(); renderLocationOptions();
        selectedSources.clear();   updateSourceButtonText();   renderSourceOptions();
        selectedProjects.clear();  updateProjectButtonText();  renderProjectOptions();
        setZone('mid');
        renderDashboard();
    }

    function showProjectDetails(projectName) {
        const leads = filterData().filter(r => r[1] === projectName);
        if (!leads.length) { alert('No leads found for this project under current filters.'); return; }

        const srcMap = new Map();
        leads.forEach(r => {
            const src = r[2] || 'Unknown Source';
            if (!srcMap.has(src)) srcMap.set(src, []);
            srcMap.get(src).push(r[0]);
        });

        const sorted = Array.from(srcMap.entries()).sort((a,b) => b[1].length - a[1].length);
        const loc = leads[0]?.[3] || 'Unknown';
        document.getElementById('modalTitle').innerHTML =
            `${escapeHtml(projectName)} | ${escapeHtml(loc)} | ${leads.length} leads`;

        document.getElementById('timestampsList').innerHTML = sorted.map(([src, ts]) => {
            ts.sort((a,b) => { let da=parseFlexibleDate(a), db=parseFlexibleDate(b); return (db||0)-(da||0); });
            return `<div class="source-group">
                <div class="source-title">${escapeHtml(src)} (${ts.length})</div>
                ${ts.map(t => `<div class="timestamp-item">${formatDisplayDate(t)}</div>`).join('')}
            </div>`;
        }).join('');

        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    function getAllLocations() { return [...new Set(allData.map(r=>r[3]).filter(Boolean))].sort(); }
    function getAllSources()   { return [...new Set(allData.map(r=>r[2]).filter(Boolean))].sort(); }
    function getAllProjects()  { return [...new Set(allData.map(r=>r[1]).filter(Boolean))].sort(); }

    function renderLocationOptions() {
        const container = document.getElementById('locationOptions');
        const search = document.getElementById('locationSearch')?.value.toLowerCase() || '';
        const items = getAllLocations().filter(v => v.toLowerCase().includes(search));
        if (!items.length) { container.innerHTML = '<div class="dropdown-option" style="color:var(--text3);justify-content:center;">No results</div>'; return; }
        container.innerHTML = items.map(v => `
            <div class="dropdown-option">
                <input type="checkbox" id="loc_${CSS.escape(v)}" value="${escapeHtml(v)}" ${selectedLocations.has(v)?'checked':''}>
                <label for="loc_${CSS.escape(v)}">${escapeHtml(v)}</label>
            </div>`).join('');
        container.querySelectorAll('input[type=checkbox]').forEach(cb => cb.addEventListener('change', e => {
            e.stopPropagation();
            selectedLocations[cb.checked ? 'add' : 'delete'](cb.value);
            updateLocationButtonText(); renderDashboard();
        }));
    }

    function renderSourceOptions() {
        const container = document.getElementById('sourceOptions');
        const search = document.getElementById('sourceSearch')?.value.toLowerCase() || '';
        const items = getAllSources().filter(v => v.toLowerCase().includes(search));
        if (!items.length) { container.innerHTML = '<div class="dropdown-option" style="color:var(--text3);justify-content:center;">No results</div>'; return; }
        container.innerHTML = items.map(v => `
            <div class="dropdown-option">
                <input type="checkbox" id="src_${CSS.escape(v)}" value="${escapeHtml(v)}" ${selectedSources.has(v)?'checked':''}>
                <label for="src_${CSS.escape(v)}">${escapeHtml(v)}</label>
            </div>`).join('');
        container.querySelectorAll('input[type=checkbox]').forEach(cb => cb.addEventListener('change', e => {
            e.stopPropagation();
            selectedSources[cb.checked ? 'add' : 'delete'](cb.value);
            updateSourceButtonText(); renderDashboard();
        }));
    }

    function renderProjectOptions() {
        const container = document.getElementById('projectOptions');
        const search = document.getElementById('projectSearch')?.value.toLowerCase() || '';
        const items = getAllProjects().filter(v => v.toLowerCase().includes(search));
        if (!items.length) { container.innerHTML = '<div class="dropdown-option" style="color:var(--text3);justify-content:center;">No results</div>'; return; }
        container.innerHTML = items.map(v => `
            <div class="dropdown-option">
                <input type="checkbox" id="proj_${CSS.escape(v)}" value="${escapeHtml(v)}" ${selectedProjects.has(v)?'checked':''}>
                <label for="proj_${CSS.escape(v)}">${escapeHtml(v)}</label>
            </div>`).join('');
        container.querySelectorAll('input[type=checkbox]').forEach(cb => cb.addEventListener('change', e => {
            e.stopPropagation();
            selectedProjects[cb.checked ? 'add' : 'delete'](cb.value);
            updateProjectButtonText(); renderDashboard();
        }));
    }

    function updateLocationButtonText() {
        const btn = document.getElementById('locationSelectBtn');
        if (!btn) return;
        btn.innerHTML = selectedLocations.size === 0 ? 'All Locations'
            : selectedLocations.size === 1 ? `${[...selectedLocations][0]}`
            : `${selectedLocations.size} locations`;
    }
    function updateSourceButtonText() {
        const btn = document.getElementById('sourceFilterBtn');
        if (!btn) return;
        btn.innerHTML = selectedSources.size === 0 ? 'All Sources'
            : selectedSources.size === 1 ? `${[...selectedSources][0]}`
            : `${selectedSources.size} sources`;
    }
    function updateProjectButtonText() {
        const btn = document.getElementById('projectFilterBtn');
        if (!btn) return;
        btn.innerHTML = selectedProjects.size === 0 ? 'All Projects'
            : selectedProjects.size === 1 ? `${[...selectedProjects][0]}`
            : `${selectedProjects.size} projects`;
    }

    function escapeHtml(str) {
        return String(str||'').replace(/[&<>"']/g, m =>
            ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    }

    function bindEvents() {
        document.getElementById('applyDateRangeBtn').addEventListener('click', applyDateRange);
       
        document.getElementById('webDashboardBtn').addEventListener('click', () => window.location.href = 'index.html');
        window.addEventListener('click', e => { if (e.target === document.getElementById('modal')) closeModal(); });

        const pairs = [
            ['locationSelectBtn', 'locationDropdown'],
            ['sourceFilterBtn',   'sourceDropdown'],
            ['projectFilterBtn',  'projectDropdown'],
        ];
        pairs.forEach(([btnId, dropId]) => {
            const btn  = document.getElementById(btnId);
            const drop = document.getElementById(dropId);
            const others = pairs.filter(p => p[1] !== dropId).map(p => document.getElementById(p[1]));
            btn?.addEventListener('click', e => {
                e.stopPropagation();
                drop?.classList.toggle('show');
                others.forEach(d => d?.classList.remove('show'));
            });
        });
        document.addEventListener('click', () => {
            pairs.forEach(([,dropId]) => document.getElementById(dropId)?.classList.remove('show'));
        });

       document.getElementById('selectAllLocations')?.addEventListener('click', (e) => { 
    e.stopPropagation();
    getAllLocations().forEach(v => selectedLocations.add(v)); 
    renderLocationOptions(); 
    updateLocationButtonText(); 
    renderDashboard(); 
});
document.getElementById('clearAllLocations')?.addEventListener('click', (e) => { 
    e.stopPropagation();
    selectedLocations.clear(); 
    renderLocationOptions(); 
    updateLocationButtonText(); 
    renderDashboard(); 
});
document.getElementById('selectAllSources')?.addEventListener('click', (e) => { 
    e.stopPropagation();
    getAllSources().forEach(v => selectedSources.add(v)); 
    renderSourceOptions(); 
    updateSourceButtonText(); 
    renderDashboard(); 
});
document.getElementById('clearAllSources')?.addEventListener('click', (e) => { 
    e.stopPropagation();
    selectedSources.clear(); 
    renderSourceOptions(); 
    updateSourceButtonText(); 
    renderDashboard(); 
});
document.getElementById('selectAllProjects')?.addEventListener('click', (e) => { 
    e.stopPropagation();
    getAllProjects().forEach(v => selectedProjects.add(v)); 
    renderProjectOptions(); 
    updateProjectButtonText(); 
    renderDashboard(); 
});
document.getElementById('clearAllProjects')?.addEventListener('click', (e) => { 
    e.stopPropagation();
    selectedProjects.clear(); 
    renderProjectOptions(); 
    updateProjectButtonText(); 
    renderDashboard(); 
});

        document.getElementById('locationSearch')?.addEventListener('input', renderLocationOptions);
        document.getElementById('sourceSearch')?.addEventListener('input',   renderSourceOptions);
        document.getElementById('projectSearch')?.addEventListener('input',  renderProjectOptions);
    }

    const savedTheme = localStorage.getItem('leads_theme') || 'dark';
    setTheme(savedTheme);
    bindEvents();
    setupZoneSlider();
    fetchData();
</script>
